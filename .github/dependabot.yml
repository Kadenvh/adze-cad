version: 2
updates:
  # NuGet packages for C# projects
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      nuget-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
      nuget-security:
        applies-to: "security-updates"
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "nuget"

  # GitHub Actions workflow files
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(ci)"
    labels:
      - "dependencies"
      - "github-actions"
