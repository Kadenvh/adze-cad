name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build + Test (Windows)
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v3

      - name: Restore NuGet packages
        run: nuget restore Adze.sln

      # Adze.Host references SolidWorks.Interop.* (COM interop DLLs that ship
      # with SOLIDWORKS only), so we build the test project directly. This
      # transitively builds all CI-buildable projects: Contracts, Index,
      # Tools, Trace, Broker, and Adze.Tests.
      - name: Build test project and dependencies
        run: msbuild tests\Adze.Tests\Adze.Tests.csproj /t:Build /p:Configuration=Debug /p:Platform=AnyCPU /nologo /m

      - name: Run unit tests
        shell: pwsh
        run: pwsh -NoProfile -File scripts\setup\run-tests.ps1 -SkipRestore

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResult.xml
          if-no-files-found: ignore
