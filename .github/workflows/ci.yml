name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build + Test (Windows)
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v3

      - name: Restore NuGet packages
        run: nuget restore Adze.sln

      # Adze.Host references SolidWorks.Interop.* COM DLLs that ship with
      # SOLIDWORKS only. Pass IncludeHostTests=false so the test project
      # skips the Adze.Host ProjectReference and the 10 Host-dependent tests.
      # 692 CI-runnable tests still execute; the 10 skipped ones run locally.
      - name: Build test project and CI-buildable dependencies
        run: msbuild tests\Adze.Tests\Adze.Tests.csproj /t:Build /p:Configuration=Debug /p:Platform=AnyCPU /p:IncludeHostTests=false /nologo /m

      - name: Run unit tests
        shell: pwsh
        run: pwsh -NoProfile -File scripts\setup\run-tests.ps1 -SkipRestore -IncludeHostTests:$false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResult.xml
          if-no-files-found: ignore
