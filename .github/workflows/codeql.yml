name: CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "32 7 * * 1"   # Mondays 07:32 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: windows-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [ "csharp" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Restore NuGet packages
        run: nuget restore Adze.sln

      # Adze.Host (and transitively Adze.Tests + Adze.Manager) depend on
      # SOLIDWORKS COM interop DLLs that are not available on the runner.
      # Build the 5 CI-buildable library projects individually so CodeQL
      # analyzes all the platform-independent code (broker, tools, trace,
      # contracts, index) without pulling in the SW-dependent ones.
      - name: Build CI-buildable projects
        run: |
          msbuild src\Adze.Contracts\Adze.Contracts.csproj /t:Rebuild /p:Configuration=Release /p:Platform=AnyCPU /nologo /m
          msbuild src\Adze.Index\Adze.Index.csproj /t:Rebuild /p:Configuration=Release /p:Platform=AnyCPU /nologo /m
          msbuild src\Adze.Tools\Adze.Tools.csproj /t:Rebuild /p:Configuration=Release /p:Platform=AnyCPU /nologo /m
          msbuild src\Adze.Trace\Adze.Trace.csproj /t:Rebuild /p:Configuration=Release /p:Platform=AnyCPU /nologo /m
          msbuild src\Adze.Broker\Adze.Broker.csproj /t:Rebuild /p:Configuration=Release /p:Platform=AnyCPU /nologo /m

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
