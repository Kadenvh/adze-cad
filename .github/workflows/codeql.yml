name: CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: "32 7 * * 1"   # Mondays 07:32 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: windows-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        language: [ "csharp" ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Restore NuGet packages
        run: nuget restore Adze.sln

      # Adze.Host depends on SOLIDWORKS COM interop DLLs that are not
      # available on the runner. Analyze all CI-buildable projects instead.
      - name: Build test project and dependencies
        run: msbuild tests\Adze.Tests\Adze.Tests.csproj /t:Rebuild /p:Configuration=Release /p:Platform=AnyCPU /nologo /m

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
